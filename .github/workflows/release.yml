name: Build and Upload Extension

on:
  release:
    types: [published]   # Срабатывает, когда вы публикуете релиз

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP archive
        run: |
          # Создаём ZIP, исключая служебные файлы
          zip -r extension.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x ".vscode/*" \
            -x "*.md" \
            -x "build/*"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.zip