name: Build and Upload Extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build extension
        run: npm run build
      
      - name: Create ZIP from build folder
        run: |
          cd build
          zip -r ../extension.zip .
          cd ..
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.zip