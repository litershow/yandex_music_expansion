name: Build and Upload Extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build extension
        run: npm run build
      
      - name: List build folder (for debugging)
        run: ls -la dist/ || ls -la build/ || echo "No dist or build folder found"
      
      - name: Create ZIP from build folder
        run: |
          if [ -d "dist" ]; then
            cd dist
            zip -r ../extension.zip .
          elif [ -d "build" ]; then
            cd build
            zip -r ../extension.zip .
          else
            echo "Neither dist nor build folder exists!"
            exit 1
          fi
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.zip